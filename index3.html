<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: rgb(3, 242, 242);
            border: solid 2px;
            display: inline-block;
        }
    .box1{
        position: static;
        background-color: red;
        z-index: 5;
    }
    .box2{
        position: relative;
        background-color: azure;
        top: 25px;
        left: 25px;
        right: 25px;
    }
    .box3{
        position: absolute;
        background-color: green;
        top: 25px;
        left: 20px;
        right: 20px;
        z-index: -2;
    }
    .box4{
        position: sticky;
        right: 90px;
        top: 90px;
        height: 200px;
        width: 200px;
        background-image: url(ASUSTUF.jpg);
        background-size: cover;

    }
    .box5{
        position:sticky;
        top: 20px;
        background-color: blue;
    }
    </style>
</head>
<body>
    
       
       
            <div class="box1">box1</div>
            <div class="box2">box2</div>
            <div class="box3">box3</div>
            <div class="box4">box4</div>
            <div class="box5">box5</div>
    
    
</body>
</html>
